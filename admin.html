<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Admin Control - Antrian Optes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2a, #06122a);
            color: white;
            padding: 30px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .login-box, .admin-panel {
            background: rgba(10,20,40,0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid #4488ff;
            padding: 35px;
            max-width: 450px;
            margin: 100px auto;
        }
        .admin-panel { max-width: 100%; margin: 0; display: none; }
        h2 { color: #4488ff; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #4488ff;
            border-radius: 14px;
            color: white;
            margin: 15px 0;
            font-size: 1rem;
        }
        .btn {
            background: linear-gradient(135deg, #2266cc, #4488ff);
            border: none;
            padding: 14px;
            border-radius: 14px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(68,136,255,0.3);
        }
        th { color: #4488ff; }
        .delete-btn {
            background: rgba(255,68,68,0.2);
            border: 1px solid #ff4444;
            color: #ff8888;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .refresh-btn {
            background: #224466;
            margin-right: 10px;
            width: auto;
            display: inline-block;
            padding: 10px 20px;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .notification-badge {
            background: #ff4444;
            color: white;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: bold;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a3355;
            border-left: 4px solid #4488ff;
            padding: 10px 20px;
            border-radius: 12px;
            z-index: 1000;
            display: none;
        }
        .toast.show { display: block; animation: fadeInUp 0.3s; }
        @keyframes fadeInUp {
            from { transform: translateX(-50%) translateY(20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        .sound-toggle {
            background: #335588;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }
        @media (max-width: 700px) {
            th, td { font-size: 0.8rem; padding: 8px; }
            .header-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="loginPanel" class="login-box">
        <h2>ADMIN ACCESS</h2>
        <p style="color: #aaccff; margin-bottom: 10px;">masukkan key untuk mengakses panel</p>
        <input type="password" id="adminKey" placeholder="masukkan key 142201">
        <button class="btn" id="loginAdminBtn">VERIFIKASI</button>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div class="header-bar">
            <h2>PANEL ADMIN ANTRIAN OPTES</h2>
            <div>
                <button class="btn refresh-btn" id="refreshDataBtn">REFRESH DATA</button>
                <button class="btn refresh-btn" id="exportDataBtn" style="background:#335588;">EXPORT JSON</button>
                <button class="btn refresh-btn" id="clearAllBtn" style="background:#882222;">HAPUS SEMUA</button>
                <button class="sound-toggle" id="soundToggleBtn">🔊 SOUND ON</button>
            </div>
        </div>
        <div id="tableContainer">Loading data...</div>
        <div id="notificationArea" style="margin-top: 15px; text-align: center;"></div>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
    const ADMIN_KEY = "142201";
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbxRfgjkFEModhgySfUA_ry3LP2ywR1hcxNDt-EX2ezwXyOstVsOzsAQX8JPHhEMeajcew/exec";

    let currentData = [];
    let lastDataHash = "";
    let autoRefreshInterval = null;
    let soundEnabled = true;
    let audioContext = null;

    function playNotificationSound() {
        if (!soundEnabled) return;
        try {
            // Create beep sound using Web Audio API
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.value = 880;
            gainNode.gain.value = 0.3;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 1);
            oscillator.stop(audioContext.currentTime + 0.5);
        } catch(e) { console.log("Audio not supported"); }
    }

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.borderLeftColor = isError ? '#ff4444' : '#4488ff';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function computeDataHash(data) {
        return JSON.stringify(data.map(item => `${item.id}-${item.nomor}-${item.waktu}`));
    }

    async function fetchAllData() {
        try {
            const response = await fetch(`${GOOGLE_SHEET_URL}?action=getAll`);
            const data = await response.json();
            if (data.success && Array.isArray(data.data)) {
                return data.data;
            }
            return [];
        } catch (error) {
            console.log('gagal fetch, ambil dari localStorage backup');
            const local = localStorage.getItem('antrian_backup_admin');
            return local ? JSON.parse(local) : [];
        }
    }

    async function checkForNewData() {
        const newData = await fetchAllData();
        const newHash = computeDataHash(newData);
        
        if (lastDataHash && newHash !== lastDataHash) {
            // Ada data baru!
            const oldCount = currentData.length;
            const newCount = newData.length;
            if (newCount > oldCount) {
                const newEntries = newData.slice(oldCount);
                newEntries.forEach(entry => {
                    showToast(`🔔 ANTRIAN BARU! Nomor ${entry.nomor} - ID: ${entry.id}`);
                    playNotificationSound();
                });
                // Tampilkan notifikasi di area khusus
                const notifDiv = document.getElementById('notificationArea');
                notifDiv.innerHTML = `<div class="notification-badge">📢 ADA ANTRIAN BARU! Total: ${newCount}</div>`;
                setTimeout(() => {
                    if (notifDiv.innerHTML.includes('ADA ANTRIAN BARU')) {
                        notifDiv.innerHTML = '';
                    }
                }, 5000);
            }
        }
        
        currentData = newData;
        lastDataHash = newHash;
        renderTable();
    }

    async function deleteData(id, nomor) {
        const params = new URLSearchParams();
        params.append('action', 'delete');
        params.append('id', id);
        params.append('nomor', nomor);

        try {
            await fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: params.toString(),
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            showToast(`Antrian nomor ${nomor} dihapus`);
            await checkForNewData();
        } catch (error) {
            currentData = currentData.filter(item => !(item.id === id && item.nomor == nomor));
            localStorage.setItem('antrian_backup_admin', JSON.stringify(currentData));
            renderTable();
            showToast(`data lokal dihapus (koneksi gagal)`);
        }
    }

    async function clearAll() {
        if (!confirm('Hapus SEMUA data antrian? Tindakan permanen!')) return;
        try {
            await fetch(`${GOOGLE_SHEET_URL}?action=clearAll`, { mode: 'no-cors' });
            showToast('Semua data telah dihapus');
            await checkForNewData();
        } catch (error) {
            currentData = [];
            localStorage.setItem('antrian_backup_admin', '[]');
            renderTable();
            showToast('data lokal dihapus');
        }
    }

    function exportJSON() {
        if (!currentData.length) {
            showToast('Tidak ada data', true);
            return;
        }
        const dataStr = JSON.stringify(currentData, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `antrian_optes_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Data berhasil diexport');
    }

    function renderTable() {
        const container = document.getElementById('tableContainer');
        if (!currentData.length) {
            container.innerHTML = '<p style="text-align:center; padding:40px;">Belum ada data antrian</p>';
            return;
        }
        const sorted = [...currentData].sort((a,b) => a.nomor - b.nomor);
        let html = `<table><thead><tr><th>NO. ANTRIAN</th><th>ID GAME</th><th>WAKTU</th><th>AKSI</th></tr></thead><tbody>`;
        sorted.forEach(item => {
            html += `<tr>
                        <td>${item.nomor}</td>
                        <td><strong>${escapeHtml(item.id)}</strong></td>
                        <td>${new Date(item.waktu).toLocaleString('id-ID')}</td>
                        <td><button class="delete-btn" data-id="${item.id}" data-nomor="${item.nomor}">HAPUS</button></td>
                     </tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                const nomor = btn.getAttribute('data-nomor');
                deleteData(id, nomor);
            });
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function startAutoRefresh() {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        // Cek setiap 5 detik apakah ada antrian baru
        autoRefreshInterval = setInterval(() => {
            checkForNewData();
        }, 5000);
    }

    document.getElementById('loginAdminBtn').addEventListener('click', async () => {
        const key = document.getElementById('adminKey').value;
        if (key === ADMIN_KEY) {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            await checkForNewData();
            startAutoRefresh();
            showToast('Akses diberikan, notifikasi otomatis aktif');
        } else {
            showToast('Key salah! Akses ditolak', true);
        }
    });

    document.getElementById('refreshDataBtn').addEventListener('click', () => checkForNewData());
    document.getElementById('exportDataBtn').addEventListener('click', exportJSON);
    document.getElementById('clearAllBtn').addEventListener('click', clearAll);
    
    document.getElementById('soundToggleBtn').addEventListener('click', () => {
        soundEnabled = !soundEnabled;
        document.getElementById('soundToggleBtn').textContent = soundEnabled ? "🔊 SOUND ON" : "🔇 SOUND OFF";
        showToast(`Suara notifikasi ${soundEnabled ? 'diaktifkan' : 'dimatikan'}`);
    });
</script>
</body>
</html>
