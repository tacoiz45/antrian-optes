<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Antrian Optes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', monospace;
            background: #0a0a2a;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .login-box, .admin-panel {
            background: rgba(10,20,40,0.9);
            border-radius: 20px;
            border: 1px solid #4488ff;
            padding: 30px;
        }
        .login-box { max-width: 400px; margin: 100px auto; }
        .admin-panel { display: none; }
        input {
            width: 100%;
            padding: 12px;
            background: #1a1a3a;
            border: 1px solid #4488ff;
            border-radius: 10px;
            color: white;
            margin: 10px 0;
        }
        .btn {
            background: #4488ff;
            padding: 12px;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            width: 100%;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #4488ff; }
        .delete-btn {
            background: #ff4444;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .refresh-btn {
            background: #335588;
            width: auto;
            display: inline-block;
            padding: 8px 15px;
        }
        .badge {
            background: #ff4444;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a3355;
            border-left: 4px solid #4488ff;
            padding: 10px 20px;
            border-radius: 10px;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="loginPanel" class="login-box">
        <h2>ADMIN ACCESS</h2>
        <input type="password" id="adminKey" placeholder="Key 142201">
        <button class="btn" id="loginBtn">LOGIN</button>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div class="header-bar">
            <h2>PANEL ADMIN ANTRIAN</h2>
            <div>
                <button class="btn refresh-btn" id="refreshBtn">REFRESH</button>
                <button class="btn refresh-btn" id="exportBtn">EXPORT</button>
                <button class="btn refresh-btn" id="clearBtn">HAPUS SEMUA</button>
            </div>
        </div>
        <div id="tableContainer">Loading...</div>
        <div id="notifArea" style="margin-top: 15px;"></div>
    </div>
</div>
<div id="toastMsg" class="toast"></div>

<script>
    const ADMIN_KEY = "142201";
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbxRfgjkFEModhgySfUA_ry3LP2ywR1hcxNDt-EX2ezwXyOstVsOzsAQX8JPHhEMeajcew/exec";
    
    let currentData = [];
    let lastCount = 0;
    let autoInterval;

    function showToast(msg) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    async function fetchData() {
        try {
            const res = await fetch(`${GOOGLE_SHEET_URL}?action=getAll`);
            const data = await res.json();
            if (data.success && Array.isArray(data.data)) {
                return data.data;
            }
            return [];
        } catch(e) {
            return [];
        }
    }

    async function loadData() {
        const newData = await fetchData();
        
        // Cek apakah ada antrian baru
        if (lastCount > 0 && newData.length > lastCount) {
            const jumlahBaru = newData.length - lastCount;
            showToast(`🔔 ADA ${jumlahBaru} ANTRIAN BARU!`);
            document.getElementById('notifArea').innerHTML = `<div class="badge">📢 +${jumlahBaru} ANTRIAN BARU!</div>`;
            setTimeout(() => document.getElementById('notifArea').innerHTML = '', 3000);
        }
        
        currentData = newData;
        lastCount = currentData.length;
        renderTable();
    }

    async function renderTable() {
        const container = document.getElementById('tableContainer');
        if (!currentData.length) {
            container.innerHTML = '<p>Belum ada antrian</p>';
            return;
        }
        
        const sorted = [...currentData].sort((a,b) => a.nomor - b.nomor);
        let html = `<table><th>NO</th><th>ID GAME</th><th>WAKTU</th><th>AKSI</th></tr>`;
        sorted.forEach(item => {
            html += `<tr>
                        <td>${item.nomor}</td>
                        <td>${item.id}</td>
                        <td>${new Date(item.waktu).toLocaleString()}</td>
                        <td><button class="delete-btn" data-id="${item.id}" data-nomor="${item.nomor}">HAPUS</button></td>
                     </tr>`;
        });
        container.innerHTML = html;
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = btn.dataset.id;
                const nomor = btn.dataset.nomor;
                const params = new URLSearchParams();
                params.append('action', 'delete');
                params.append('id', id);
                params.append('nomor', nomor);
                await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: params });
                showToast(`Antrian ${nomor} dihapus`);
                await loadData();
            });
        });
    }

    async function clearAll() {
        if (!confirm('Hapus semua antrian?')) return;
        await fetch(`${GOOGLE_SHEET_URL}?action=clearAll`, { mode: 'no-cors' });
        showToast('Semua data dihapus');
        await loadData();
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(currentData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `antrian_${new Date().toISOString()}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    document.getElementById('loginBtn').onclick = () => {
        if (document.getElementById('adminKey').value === ADMIN_KEY) {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadData();
            autoInterval = setInterval(loadData, 5000); // Auto refresh tiap 5 detik
            showToast('Login berhasil! Auto-refresh aktif');
        } else {
            showToast('Key salah!');
        }
    };
    
    document.getElementById('refreshBtn').onclick = () => loadData();
    document.getElementById('exportBtn').onclick = () => exportData();
    document.getElementById('clearBtn').onclick = () => clearAll();
</script>
</body>
</html>
