<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Antrian Optes - Ambil Antrian</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2a, #06122a);
            position: relative;
            overflow-x: hidden;
            color: white;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        .nebula {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,100,255,0.15), transparent);
            filter: blur(60px);
            pointer-events: none;
        }
        .nebula-1 { top: -150px; left: -150px; }
        .nebula-2 { bottom: -150px; right: -150px; background: radial-gradient(circle, rgba(100,0,200,0.2), transparent); }
        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #fff, #4488ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header p { color: #88aaff; margin-top: 10px; }
        .card {
            background: rgba(10,20,40,0.75);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(68,136,255,0.3);
            padding: 35px 30px;
        }
        .input-group { margin-bottom: 25px; }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaccff;
        }
        .input-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0,0,0,0.5);
            border: 1.5px solid rgba(68,136,255,0.4);
            border-radius: 16px;
            font-size: 1rem;
            color: white;
            outline: none;
        }
        .input-group input:focus {
            border-color: #4488ff;
            box-shadow: 0 0 15px rgba(68,136,255,0.3);
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2266cc, #4488ff);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(68,136,255,0.4);
        }
        .result-card {
            margin-top: 30px;
            text-align: center;
            background: linear-gradient(135deg, rgba(34,102,204,0.2), rgba(68,136,255,0.1));
            border: 2px solid #4488ff;
            display: none;
        }
        .queue-number {
            font-size: 5rem;
            font-weight: 800;
            color: #4488ff;
            text-shadow: 0 0 20px #4488ff;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a3355;
            border-left: 4px solid #4488ff;
            padding: 12px 24px;
            border-radius: 12px;
            transition: transform 0.3s;
            z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #557799;
            font-size: 0.8rem;
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 2rem; }
            .queue-number { font-size: 3.5rem; }
        }
    </style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>

<div class="container">
    <div class="header">
        <h1>ANTRIAN OPTES</h1>
        <p>masukkan id game anda untuk mendapatkan nomor antrian</p>
    </div>

    <div class="card">
        <div class="input-group">
            <label>ID GAME</label>
            <input type="text" id="gameIdInput" placeholder="contoh: 3523523523" autocomplete="off">
        </div>
        <button class="btn" id="ambilAntrianBtn">AMBIL ANTRIAN</button>
    </div>

    <div class="card result-card" id="resultCard">
        <div class="queue-number" id="queueNumber">001</div>
        <div class="queue-label">nomor antrian anda</div>
        <div class="user-id-display" id="userIdDisplay" style="margin-top: 15px; font-family: monospace;"></div>
        <p style="margin-top: 15px; font-size: 0.85rem; color: #88aaff;">id telah terkirim ke admin</p>
    </div>

    <div class="footer">
        <p>ANTRIAN OPTES | sistem antrian resmi</p>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // 🔴 GANTI DENGAN URL GOOGLE SCRIPT ANDA 🔴
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbxRfgjkFEModhgySfUA_ry3LP2ywR1hcxNDt-EX2ezwXyOstVsOzsAQX8JPHhEMeajcew/exec";
    
    let currentQueueNumber = 1;

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.borderLeftColor = isError ? '#ff4444' : '#4488ff';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    async function getNextQueueNumber() {
        try {
            const response = await fetch(`${GOOGLE_SHEET_URL}?action=getLastNumber`);
            const data = await response.json();
            return data.lastNumber ? data.lastNumber + 1 : 1;
        } catch (error) {
            console.log('error fetch, pakai lokal');
            const saved = localStorage.getItem('queue_counter');
            let last = saved ? parseInt(saved) : 0;
            return last + 1;
        }
    }

    async function saveToSheet(idGame, queueNumber) {
        const data = new URLSearchParams();
        data.append('action', 'add');
        data.append('id', idGame);
        data.append('nomor', queueNumber);
        data.append('waktu', new Date().toISOString());

        try {
            await fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: data.toString()
            });
            console.log('data terkirim ke sheet');
            return true;
        } catch (error) {
            console.log('gagal kirim ke sheet, simpan lokal');
            let localData = JSON.parse(localStorage.getItem('antrian_local') || '[]');
            localData.push({ id: idGame, nomor: queueNumber, waktu: new Date().toISOString() });
            localStorage.setItem('antrian_local', JSON.stringify(localData));
            localStorage.setItem('queue_counter', queueNumber);
            return false;
        }
    }

    async function ambilAntrian() {
        const gameId = document.getElementById('gameIdInput').value.trim();
        if (!gameId) {
            showToast('Masukkan ID Game!', true);
            return;
        }

        showToast('Memproses antrian...', false);
        
        let queueNumber = await getNextQueueNumber();
        await saveToSheet(gameId, queueNumber);

        document.getElementById('queueNumber').textContent = queueNumber.toString().padStart(3, '0');
        document.getElementById('userIdDisplay').textContent = `ID: ${gameId}`;
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('gameIdInput').value = '';
        
        showToast(`Antrian berhasil! Nomor ${queueNumber}`, false);
        setTimeout(() => {
            document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
        }, 100);
    }

    // generate stars
    function generateStars() {
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            star.style.animationDuration = Math.random() * 3 + 2 + 's';
            starsContainer.appendChild(star);
        }
    }

    document.getElementById('ambilAntrianBtn').addEventListener('click', ambilAntrian);
    document.getElementById('gameIdInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') ambilAntrian();
    });

    generateStars();
</script>
</body>
</html>
